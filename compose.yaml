x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
    target: development
  env_file: .env
  environment:
    DATABASE_URL: postgres://olp:password@db:5432/olp_development
  volumes:
    - .:/app
    - bundle_cache:/usr/local/bundle
  stdin_open: true
  tty: true

services:
  web:
    <<: *app
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: bash -c "bin/rails db:prepare && bundle exec puma -C config/puma.rb"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/up || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    <<: *app
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    command: bundle exec bin/jobs

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: olp
      POSTGRES_PASSWORD: password
      POSTGRES_DB: olp_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olp -d olp_development"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  bundle_cache:
