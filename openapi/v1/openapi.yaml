---
openapi: 3.0.3
info:
  title: LMS API
  version: v1
  description: オンライン学習プラットフォーム API
servers:
- url: http://localhost:3000
  description: Development
tags:
- name: Auth
  description: 認証
- name: Users
  description: ユーザー
- name: Courses
  description: コース
- name: Sections
  description: セクション
- name: Lessons
  description: レッスン
- name: Enrollments
  description: 受講登録
- name: LessonProgresses
  description: レッスン進捗
- name: Certificates
  description: 修了証
- name: Reviews
  description: レビュー
- name: Notifications
  description: 通知
- name: Admin
  description: 管理者
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    error_response:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: エラーコード
            message:
              type: string
              description: エラーメッセージ
            details:
              type: array
              nullable: true
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
                required:
                - field
                - message
              description: バリデーションエラー詳細
          required:
          - code
          - message
      required:
      - error
    pagination_meta:
      type: object
      properties:
        current_page:
          type: integer
        total_pages:
          type: integer
        total_count:
          type: integer
        per_page:
          type: integer
      required:
      - current_page
      - total_pages
      - total_count
      - per_page
    user:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum:
          - admin
          - instructor
          - student
        created_at:
          type: string
          format: date-time
      required:
      - id
      - email
      - name
      - role
      - created_at
    course:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        difficulty:
          type: string
          nullable: true
        max_enrollment:
          type: integer
          nullable: true
        status:
          type: string
          enum:
          - draft
          - under_review
          - published
          - rejected
        archived:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        instructor:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
          required:
          - id
          - name
        enrollment_count:
          type: integer
        average_rating:
          type: number
          nullable: true
      required:
      - id
      - title
      - status
      - archived
    course_detail:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        difficulty:
          type: string
          nullable: true
        max_enrollment:
          type: integer
          nullable: true
        status:
          type: string
          enum:
          - draft
          - under_review
          - published
          - rejected
        archived:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        instructor:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
          required:
          - id
          - name
        enrollment_count:
          type: integer
        average_rating:
          type: number
          nullable: true
        sections:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              position:
                type: integer
              lessons:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    content_type:
                      type: string
                    duration_minutes:
                      type: integer
                    position:
                      type: integer
        total_duration_minutes:
          type: integer
        total_lessons:
          type: integer
      required:
      - id
      - title
      - status
      - archived
    course_instructor:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        difficulty:
          type: string
          nullable: true
        max_enrollment:
          type: integer
          nullable: true
        status:
          type: string
          enum:
          - draft
          - under_review
          - published
          - rejected
        archived:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        enrollment_count:
          type: integer
        active_enrollment_count:
          type: integer
        completed_enrollment_count:
          type: integer
        average_rating:
          type: number
          nullable: true
        review_count:
          type: integer
      required:
      - id
      - title
      - status
      - archived
    course_create_params:
      type: object
      properties:
        course:
          type: object
          properties:
            title:
              type: string
            description:
              type: string
            category:
              type: string
            difficulty:
              type: string
            max_enrollment:
              type: integer
          required:
          - title
      required:
      - course
    section:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        position:
          type: integer
        course_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        lessons:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              content_type:
                type: string
              content_body:
                type: string
                nullable: true
              duration_minutes:
                type: integer
              position:
                type: integer
      required:
      - id
      - title
      - position
      - course_id
    section_params:
      type: object
      properties:
        section:
          type: object
          properties:
            title:
              type: string
            position:
              type: integer
          required:
          - title
      required:
      - section
    lesson:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content_type:
          type: string
        content_body:
          type: string
          nullable: true
        duration_minutes:
          type: integer
        position:
          type: integer
        section_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - title
      - content_type
      - section_id
    lesson_params:
      type: object
      properties:
        lesson:
          type: object
          properties:
            title:
              type: string
            content_type:
              type: string
            content_body:
              type: string
            duration_minutes:
              type: integer
            position:
              type: integer
          required:
          - title
          - content_type
      required:
      - lesson
    enrollment:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum:
          - pending
          - active
          - completed
          - suspended
        enrolled_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
          required:
          - id
          - name
        course:
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
          required:
          - id
          - title
        progress:
          type: object
          properties:
            total_lessons:
              type: integer
            completed_lessons:
              type: integer
            percentage:
              type: number
      required:
      - id
      - status
    lesson_progress:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        completed_at:
          type: string
          format: date-time
          nullable: true
        lesson:
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
            content_type:
              type: string
          required:
          - id
          - title
          - content_type
      required:
      - id
      - status
    lesson_progress_params:
      type: object
      properties:
        progress:
          type: object
          properties:
            status:
              type: string
              enum:
              - not_started
              - in_progress
              - completed
          required:
          - status
      required:
      - progress
    certificate:
      type: object
      properties:
        id:
          type: integer
        certificate_number:
          type: string
        status:
          type: string
        issued_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        course:
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
          required:
          - id
          - title
        user:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
          required:
          - id
          - name
      required:
      - id
      - certificate_number
      - status
    review:
      type: object
      properties:
        id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        anonymous:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: integer
              nullable: true
            name:
              type: string
        course:
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
          required:
          - id
          - title
      required:
      - id
      - rating
      - anonymous
    review_params:
      type: object
      properties:
        review:
          type: object
          properties:
            rating:
              type: integer
              minimum: 1
              maximum: 5
            comment:
              type: string
            anonymous:
              type: boolean
          required:
          - rating
      required:
      - review
    notification:
      type: object
      properties:
        id:
          type: integer
        notification_type:
          type: string
        params:
          type: object
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        read:
          type: boolean
      required:
      - id
      - notification_type
      - read
    auth_tokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
      required:
      - access_token
      - refresh_token
      - token_type
      - expires_in
    register_params:
      type: object
      properties:
        user:
          type: object
          properties:
            email:
              type: string
              format: email
            name:
              type: string
            password:
              type: string
              minLength: 8
            password_confirmation:
              type: string
            role:
              type: string
              enum:
              - student
              - instructor
          required:
          - email
          - name
          - password
          - password_confirmation
      required:
      - user
    login_params:
      type: object
      properties:
        auth:
          type: object
          properties:
            email:
              type: string
              format: email
            password:
              type: string
          required:
          - email
          - password
      required:
      - auth
    dashboard:
      type: object
      properties:
        dashboard:
          type: object
          properties:
            users:
              type: object
              properties:
                total:
                  type: integer
                by_role:
                  type: object
                  properties:
                    admin:
                      type: integer
                    instructor:
                      type: integer
                    student:
                      type: integer
            courses:
              type: object
              properties:
                total:
                  type: integer
                by_status:
                  type: object
                  properties:
                    draft:
                      type: integer
                    under_review:
                      type: integer
                    published:
                      type: integer
                    rejected:
                      type: integer
                archived:
                  type: integer
            enrollments:
              type: object
              properties:
                total:
                  type: integer
                by_status:
                  type: object
                  properties:
                    pending:
                      type: integer
                    active:
                      type: integer
                    completed:
                      type: integer
                    suspended:
                      type: integer
            certificates:
              type: object
              properties:
                total:
                  type: integer
                issued:
                  type: integer
            reviews:
              type: object
              properties:
                total:
                  type: integer
                average_rating:
                  type: number
                  nullable: true
      required:
      - dashboard
paths:
  "/api/v1/admin/dashboard":
    get:
      summary: ダッシュボード統計
      tags:
      - Admin
      security:
      - bearer_auth: []
      responses:
        '200':
          description: 統計取得成功
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/dashboard"
        '403':
          description: 非管理者はアクセス不可
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
  "/api/v1/admin/courses":
    get:
      summary: 管理者向けコース一覧
      tags:
      - Admin
      security:
      - bearer_auth: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: items
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: コース一覧取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      "$ref": "#/components/schemas/course_instructor"
                  meta:
                    "$ref": "#/components/schemas/pagination_meta"
                required:
                - courses
                - meta
  "/api/v1/admin/courses/pending_review":
    get:
      summary: レビュー待ちコース一覧
      tags:
      - Admin
      security:
      - bearer_auth: []
      responses:
        '200':
          description: レビュー待ちコース取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      "$ref": "#/components/schemas/course_instructor"
                  meta:
                    "$ref": "#/components/schemas/pagination_meta"
                required:
                - courses
                - meta
  "/api/v1/auth/register":
    post:
      summary: ユーザー登録
      tags:
      - Auth
      parameters: []
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    "$ref": "#/components/schemas/user"
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
                required:
                - user
                - access_token
                - refresh_token
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/register_params"
  "/api/v1/auth/login":
    post:
      summary: ログイン
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    "$ref": "#/components/schemas/user"
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
                required:
                - user
                - access_token
                - refresh_token
        '401':
          description: 認証失敗
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/login_params"
  "/api/v1/auth/logout":
    delete:
      summary: ログアウト
      tags:
      - Auth
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '204':
          description: ログアウト成功
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
  "/api/v1/auth/refresh":
    post:
      summary: トークンリフレッシュ
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: リフレッシュ成功
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/auth_tokens"
        '401':
          description: 無効なリフレッシュトークン
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
              - refresh_token
  "/api/v1/users/me":
    get:
      summary: 自分のプロフィール取得
      tags:
      - Users
      responses:
        '401':
          description: 未認証
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '200':
          description: プロフィール取得成功
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/user"
      security:
      - bearer_auth: []
    patch:
      summary: 自分のプロフィール更新
      tags:
      - Users
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/user"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
  "/api/v1/certificates":
    get:
      summary: 修了証一覧
      tags:
      - Certificates
      security:
      - bearer_auth: []
      responses:
        '200':
          description: 修了証一覧取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  certificates:
                    type: array
                    items:
                      "$ref": "#/components/schemas/certificate"
                required:
                - certificates
  "/api/v1/certificates/{certificate_number}":
    parameters:
    - name: certificate_number
      in: path
      required: true
      schema:
        type: string
    get:
      summary: 修了証詳細（認証不要）
      tags:
      - Certificates
      responses:
        '200':
          description: 修了証取得成功
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/certificate"
        '404':
          description: 修了証が見つからない
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
  "/api/v1/courses":
    get:
      summary: コース一覧
      tags:
      - Courses
      security:
      - bearer_auth: []
      parameters:
      - name: q
        in: query
        required: false
        description: キーワード検索
        schema:
          type: string
      - name: category
        in: query
        required: false
        schema:
          type: string
      - name: difficulty
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: items
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: コース一覧取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      "$ref": "#/components/schemas/course"
                  meta:
                    "$ref": "#/components/schemas/pagination_meta"
                required:
                - courses
                - meta
    post:
      summary: コース作成
      tags:
      - Courses
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: コース作成成功
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/course_instructor"
        '403':
          description: 受講者はコース作成不可
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/course_create_params"
  "/api/v1/courses/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: コース詳細
      tags:
      - Courses
      security:
      - bearer_auth: []
      responses:
        '200':
          description: 講師向けコース詳細
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/course_instructor"
        '404':
          description: コースが見つからない
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '403':
          description: 他の講師のドラフトコースへのアクセス拒否
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    patch:
      summary: コース更新
      tags:
      - Courses
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/course_instructor"
        '403':
          description: 他の講師のコースは更新不可
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/course_create_params"
    delete:
      summary: コース削除
      tags:
      - Courses
      security:
      - bearer_auth: []
      responses:
        '204':
          description: 削除成功
        '403':
          description: 公開済みコースの削除拒否（講師）
